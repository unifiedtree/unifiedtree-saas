spring:
  application:
    name: unifiedtree-hrms

  profiles:
    active: canonical

  datasource:
    url: ${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/unifiedtree_hrms}}
    username: ${DB_USERNAME:unifiedtree}
    password: ${DB_PASSWORD:unifiedtree}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_batch_fetch_size: 50
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 25

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hrms}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    listener:
      auto-startup: ${HRMS_KAFKA_ENABLED:false}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: unifiedtree-hrms
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hrms.*"

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:${SMTP_USERNAME:}}
    password: ${SMTP_PASS:${SMTP_PASSWORD:}}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_TLS:${SMTP_STARTTLS:false}}
      # Bound every stage of the SMTP exchange so an unreachable/unresponsive mail
      # server fails fast (≈8s) instead of hanging on the OS socket default (30s+).
      mail.smtp.connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:8000}
      mail.smtp.timeout: ${SMTP_READ_TIMEOUT:8000}
      mail.smtp.writetimeout: ${SMTP_WRITE_TIMEOUT:8000}

server:
  port: ${PORT:8080}
  compression:
    enabled: true
  http2:
    enabled: true
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: false
    mail:
      enabled: false
    redis:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{tenantId}] [%X{traceId}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.hrms: DEBUG
    org.hibernate.SQL: WARN

hrms:
  security:
    cors:
      # Comma-separated list of origins. Use `*` to allow any origin (recommended
      # for dev because the Cloudflare tunnel URL changes every restart and the
      # Expo Go phone uses a different origin than the browser). Lock this down
      # for production deployments.
      allowed-origins: ${HRMS_CORS_ALLOWED_ORIGINS:*}
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY:7}
  face-recognition:
    enabled: ${FACE_RECOGNITION_ENABLED:false}
    sidecar-url: ${FACE_SIDECAR_URL:http://localhost:8085}
    confidence-threshold: ${FACE_CONFIDENCE_THRESHOLD:0.92}
    timeout-seconds: ${FACE_TIMEOUT:10}
  attendance:
    geo-fence-radius-meters: ${GEO_FENCE_RADIUS:100}
  auth:
    otp:
      debug-response-enabled: ${OTP_DEBUG_RESPONSE_ENABLED:true}
  ai:
    sidecar-url: ${AI_SIDECAR_URL:http://localhost:8093}
  kafka:
    enabled: ${HRMS_KAFKA_ENABLED:false}

unifiedtree:
  base-domain: ${UNIFIEDTREE_BASE_DOMAIN:unifiedtree.com}

  mail:
    # Provider selector: 'smtp' (default — Mailpit/Gmail) or 'brevo' (REST API).
    provider: ${MAIL_PROVIDER:smtp}
    from-email: ${MAIL_FROM_EMAIL:noreply@unifiedtree.com}
    from-name:  ${MAIL_FROM_NAME:UnifiedTree}
    # Base URL the invitation/reset links point at. Dev: plain localhost:3001.
    # Prod: scheme+domain; tenant subdomain is prepended per-tenant.
    invite-url-base: ${INVITE_URL_BASE:http://localhost:3001}

app:
  pii:
    # 32-byte (256-bit) AES key, Base64-encoded. Generate with:
    # openssl rand -base64 32
    encryption-key: ${PII_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
