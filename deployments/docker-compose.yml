version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unifiedtree-postgres
    environment:
      POSTGRES_DB: unifiedtree
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d unifiedtree"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unifiedtree-net

  redis:
    image: redis:7-alpine
    container_name: unifiedtree-redis
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - unifiedtree-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: unifiedtree-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - unifiedtree-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: unifiedtree-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - unifiedtree-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: unifiedtree-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: unifiedtree
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"
    networks:
      - unifiedtree-net

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:

networks:
  unifiedtree-net:
    driver: bridge
