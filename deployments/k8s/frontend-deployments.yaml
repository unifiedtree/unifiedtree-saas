# Website — port 3000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifiedtree-website
  namespace: unifiedtree
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unifiedtree-website
  template:
    metadata:
      labels:
        app: unifiedtree-website
    spec:
      containers:
        - name: website
          image: ghcr.io/unifiedtree/website:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: website-service
  namespace: unifiedtree
spec:
  selector:
    app: unifiedtree-website
  ports:
    - port: 80
      targetPort: 80
---
