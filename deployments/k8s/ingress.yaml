apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unifiedtree-ingress
  namespace: unifiedtree
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  tls:
    - hosts:
        - unifiedtree.com
        - www.unifiedtree.com
        - <tenant>.unifiedtree.com
        - admin.unifiedtree.com
        - api.unifiedtree.com
      secretName: unifiedtree-tls
  rules:
    - host: unifiedtree.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website-service
                port:
                  number: 80
    - host: www.unifiedtree.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website-service
                port:
                  number: 80
    - host: <tenant>.unifiedtree.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-service
                port:
                  number: 80
    - host: admin.unifiedtree.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 80
    - host: api.unifiedtree.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
