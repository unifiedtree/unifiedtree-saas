version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: unifiedtree-nginx
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/nginx/vhost.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-unifiedtree.com}
      BACKEND_HOST: backend
      BACKEND_PORT: 8080
    depends_on:
      - backend
      - website
      - platform
      - admin
    networks:
      - unifiedtree-net

  backend:
    image: ${REGISTRY:-ghcr.io}/unifiedtree/backend:${VERSION:-latest}
    container_name: unifiedtree-backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      JWT_SECRET: ${JWT_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
    networks:
      - unifiedtree-net

  website:
    image: ${REGISTRY:-ghcr.io}/unifiedtree/website:${VERSION:-latest}
    container_name: unifiedtree-website
    networks:
      - unifiedtree-net

  platform:
    image: ${REGISTRY:-ghcr.io}/unifiedtree/platform:${VERSION:-latest}
    container_name: unifiedtree-platform
    networks:
      - unifiedtree-net

  admin:
    image: ${REGISTRY:-ghcr.io}/unifiedtree/admin:${VERSION:-latest}
    container_name: unifiedtree-admin
    networks:
      - unifiedtree-net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  certbot_certs:
  certbot_www:

networks:
  unifiedtree-net:
    driver: bridge
