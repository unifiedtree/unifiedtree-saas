    <meta name="description" content="UnifiedTree — your workspace for HR, attendance, payroll, and every connected business module." />
    <meta property="og:title" content="UnifiedTree Platform" />
    <meta property="og:description" content="Your UnifiedTree workspace — HR, attendance, payroll and more." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Tabler Icons webfont — client HR design uses ti ti-* icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
    <!-- No-flash theme script: reads ut.theme from localStorage and sets data-theme BEFORE paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ut.theme') || 'system';
          var resolved = t === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : t;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
